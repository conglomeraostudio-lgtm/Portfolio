<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto — Conglomerao</title>
  <meta name="description" content="Contacta con Isabel Yaben Reyes. Instagram y email." />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <div id="page-transition"></div>

  <header class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Isabel Yaben Reyes</a>

        <nav class="nav-links" id="nav-links" role="navigation" aria-label="Navegación principal">
          <a href="index.html"    class="nav-link ">Inicio</a>
          <a href="projects.html" class="nav-link ">Proyectos</a>
          <a href="about.html"    class="nav-link ">Sobre mí</a>
          <a href="timeline.html" class="nav-link ">Trayectoria</a>
          <a href="contact.html"  class="nav-link active">Contacto</a>
        </nav>

        <button class="hamburger" id="hamburger" aria-label="Abrir menú" aria-expanded="false">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </div>
  </header>

  <main class="contact-main">
    <div class="contact-inner">

      <div class="contact-eyebrow reveal">
        <span class="eyebrow-line"></span>
        <span class="eyebrow-label">Contacto</span>
      </div>

      <h1 class="contact-title reveal reveal-d1">Hablemos</h1>

      <p class="contact-tagline reveal reveal-d2">
        Para colaboraciones, exposiciones,<br>residencias o cualquier propuesta.
      </p>

      <div class="contact-links reveal reveal-d3">

        <a href="mailto:hola@conglomerao.es" class="contact-item" aria-label="Enviar email">
          <div class="contact-item-left">
            <span class="contact-item-label">Email</span>
            <span class="contact-item-value">hola@conglomerao.es</span>
          </div>
          <span class="contact-item-arrow" aria-hidden="true">↗</span>
        </a>

        <a href="https://instagram.com/conglomerao" target="_blank" rel="noopener noreferrer" class="contact-item" aria-label="Instagram de Conglomerao">
          <div class="contact-item-left">
            <span class="contact-item-label">Instagram</span>
            <span class="contact-item-value">@conglomerao</span>
          </div>
          <span class="contact-item-arrow" aria-hidden="true">↗</span>
        </a>

      </div>

      <p class="contact-location reveal">Madrid, España</p>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">Isabel Yaben Reyes</span>
      <p class="footer-copy">© 2024. Madrid, España.</p>
      <a href="index.html" class="footer-back"> Inicio</a>
    </div>
  </footer>

  <script src="shared.js"></script>
